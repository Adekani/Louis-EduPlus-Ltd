<style>
    /* Prevent raw-flash layout shift */
    .fallback-logo[src=""], .fallback-logo:not([src]){
        opacity: 0;
    }
</style>

<script>
    // Developer Note (Adekani): Clean active tab marking based on URL matching
    const mobileBtn = document.getElementById('mobile-menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');

    if(mobileBtn && mobileMenu) {
        mobileBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
            const isOpen = !mobileMenu.classList.contains('hidden');
            if(isOpen) {
                mobileBtn.innerHTML = `<svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>`;
            } else {
                mobileBtn.innerHTML = `<svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>`;
            }
        });
    }

    const path = window.location.pathname.split('/').pop() || 'index.html';
    document.querySelectorAll('.nav-link').forEach(link => {
        if(link.getAttribute('href') === path) {
            link.classList.add('text-[#D4AF37]');
            link.classList.remove('text-[#FAF7F0]/80');
            const line = link.querySelector('span');
            if(line) {
                line.classList.remove('w-0');
                line.classList.add('w-full');
            }
        }
    });
</script>
