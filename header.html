<style>
    /* Custom Gold Utility Classes */
    .text-gold-300 { color: #fde68a; }
    .text-gold-400 { color: #fbbf24; }
    .bg-gold-400 { background-color: #fbbf24; }
    .bg-gold-500 { background-color: #f59e0b; }
    .bg-gold-600 { background-color: #d97706; }
    .bg-gold-700 { background-color: #b45309; }
    
    /* Fallback for image errors */
    .fallback-logo[src=""], .fallback-logo:not([src]){
        opacity: 0;
    }
</style>

<script>
    // Mobile Menu Logic
    const btn = document.getElementById('mobile-menu-btn');
    const menu = document.getElementById('mobile-menu');

    if(btn && menu) {
        btn.addEventListener('click', () => {
            menu.classList.toggle('hidden');
            // Animate icon
            const isOpen = !menu.classList.contains('hidden');
            if(isOpen) {
                btn.innerHTML = `<svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>`;
            } else {
                btn.innerHTML = `<svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>`;
            }
        });
    }

    // Highlight active link
    const currentPath = window.location.pathname.split('/').pop() || 'index.html';
    document.querySelectorAll('.nav-link').forEach(link => {
        if(link.getAttribute('href') === currentPath) {
            link.classList.add('text-gold-400');
            link.querySelector('span').classList.remove('w-0');
            link.querySelector('span').classList.add('w-full');
        }
    });
</script>
